<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="title desc">
  <title id="title">Logo CONGOEMPLOI</title>
  <desc id="desc">Drapeau de la Republique du Congo</desc>
  <defs>
    <clipPath id="badge">
      <rect x="8" y="8" width="80" height="80" rx="20"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="8" y="8" width="80" height="80" rx="20" fill="#fff" filter="url(#shadow)"/>
  <g clip-path="url(#badge)">
    <polygon points="8,8 88,8 8,88" fill="#009543"/>
    <polygon points="88,8 88,88 8,88" fill="#dc241f"/>
    <polygon points="-6,88 88,-6 102,8 8,102" fill="#fbde4a"/>
  </g>
  <rect x="8.5" y="8.5" width="79" height="79" rx="19.5" fill="none" stroke="#e2e8f0"/>
</svg>
